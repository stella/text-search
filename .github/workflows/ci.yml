name: CI

env:
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    types: [opened, synchronize, reopened,
            ready_for_review, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Trust gate (PRs only) ─────────────────────
  trust-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - name: Check if PR is trusted
        id: check
        env:
          HEAD_REPO: >-
            ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.repository }}
        run: |
          if [[ "$HEAD_REPO" == "$BASE_REPO" ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          elif [[ '${{ contains(github.event.pull_request.labels.*.name, 'run-ci') }}' == 'true' ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          else
            echo "trusted=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Fork PR without 'run-ci' label — CI skipped."
          fi

  # ── Lint ────────────────────────────────────────
  lint:
    name: Lint
    if: >-
      always()
      && (github.event_name != 'pull_request'
          || needs.trust-check.outputs.trusted == 'true')
    needs: [trust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint

  # ── Test ────────────────────────────────────────
  test:
    name: Test
    if: >-
      always()
      && (github.event_name != 'pull_request'
          || needs.trust-check.outputs.trusted == 'true')
    needs: [trust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test

  # ── Publish (tags only) ─────────────────────────
  publish:
    name: Publish
    if: >-
      always()
      && startsWith(github.ref, 'refs/tags/v')
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Publish to npm
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
